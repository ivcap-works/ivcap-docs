# .github/workflows/notify-hub.yml
#
# Add this workflow to each SDK and example repo.
# On release (or push to main), it pings the hub to trigger a targeted rebuild.
#
# Requirements:
#   - Create a repo secret HUB_DISPATCH_TOKEN with a PAT that has
#     `repo` scope on the hub repo (or use a fine-grained token
#     with Contents: Read & Write on the hub repo only).
#   - Set HUB_REPO and REGISTRY_SLUG for each repo.

name: Notify Hub

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "docs/**"       # only trigger when docs actually change
      - "mkdocs.yml"

env:
  HUB_REPO: "your-org/hub"
  # For SDK repos: set to the SDK's slug in sdk-registry.json
  # For example repos: set to the example's slug in example-registry.json
  REGISTRY_SLUG: "python"          # ← change per repo
  DISPATCH_TYPE: "sdk-updated"     # ← use "example-updated" for example repos

jobs:
  notify-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hub rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HUB_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: "${{ env.HUB_REPO }}".split("/")[0],
              repo:  "${{ env.HUB_REPO }}".split("/")[1],
              event_type: "${{ env.DISPATCH_TYPE }}",
              client_payload: {
                sdk:     "${{ env.REGISTRY_SLUG }}",
                example: "${{ env.REGISTRY_SLUG }}",
                source_repo: context.repo.repo,
                ref: context.ref,
              },
            });
            console.log("Hub rebuild triggered for: ${{ env.REGISTRY_SLUG }}");
