# mkdocs-template.yml
# Nav placeholders are replaced by generate_nav.py:
#   __SDK__           → pulled SDK narrative doc pages
#   __CAPABILITIES__  → capability pages with grouped examples
#   __EXAMPLES__      → flat list of all example index pages

site_name: "Platform Hub"
site_url: "https://your-org.github.io/hub"
repo_url: "https://github.com/your-org/hub"
repo_name: "your-org/hub"
edit_uri: "edit/main/docs/"

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - tags:
      tags_file: tags.md
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Capabilities:
    - __CAPABILITIES__
  - SDKs:
    - Overview: sdk/index.md
    - __SDK__
  - Examples:
    - Overview: examples/index.md
    - __EXAMPLES__
  - Platform API: platform-api/index.md
  - Changelog: changelog.md
  - Tags: tags.md
