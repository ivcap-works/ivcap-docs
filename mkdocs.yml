site_name: IVCAP Documentation
site_url: https://docs.ivcap.net/
site_description: >-
  IVCAP — a managed, provenance-aware platform for running, building, and
  orchestrating analytic services and AI agents.

theme:
  name: material
  custom_dir: docs/overrides
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo/logo_white_32x32.png
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md

  - Concepts:
      - concepts/index.md
      - Services and Jobs: concepts/services-and-jobs.md
      - The Data Fabric: concepts/data-fabric.md
      - Aspects and Provenance: concepts/aspects-and-provenance.md
      - Artifacts: concepts/artifacts.md
      - Queues: concepts/queues.md
      - Agentic Patterns: concepts/agentic-patterns.md

  - Get Started:
      - getting-started/index.md
      - Install the CLI: getting-started/install.md
      - Run Your First Analysis: getting-started/run-analysis.md
      - Build Your First Service: getting-started/build-service.md
      - Build Your First AI Agent: getting-started/build-agent.md

  - Guides:
      - guides/index.md
      - Running Analyses:
          - guides/running/index.md
          - Discover Services: guides/running/discover-services.md
          - Submit and Monitor Jobs: guides/running/submit-jobs.md
          - Work with Artifacts: guides/running/work-with-artifacts.md
          - Query Provenance: guides/running/query-provenance.md
          - Troubleshooting: guides/running/troubleshooting.md
      - Building Services:
          - guides/building/index.md
          - Service Basics: guides/building/service-basics.md
          - Using Artifacts: guides/building/use-artifacts.md
          - Using Queues: guides/building/use-queues.md
          - Calling Other Services: guides/building/call-other-services.md
          - Calling LLMs: guides/building/call-llms.md
          - Deploy and Register: guides/building/deploy.md
          - Running Locally: guides/building/run-locally.md
      - Building AI Agents:
          - guides/agents/index.md
          - Agent Patterns: guides/agents/agent-patterns.md
          - Multi-Agent Orchestration: guides/agents/multi-agent.md
          - CrewAI on IVCAP: guides/agents/crewai.md
          - Using IVCAP from External Agents: guides/agents/using-ivcap-externally.md
      - Integrating IVCAP:
          - guides/integrating/index.md
          - Authentication: guides/integrating/authentication.md
          - Python Client SDK: guides/integrating/python-client-sdk.md
          - REST API Primer: guides/integrating/rest-api-primer.md
          - Using IVCAP via MCP: guides/integrating/mcp.md

  - Reference:
      - reference/index.md
      - Glossary: reference/glossary.md
      - URN Reference: reference/urns.md
      - CLI Reference: reference/cli.md
      - REST API:
          - reference/api/index.md
          - Services & Jobs: reference/api/services.md
          - Artifacts: reference/api/artifacts.md
          - Aspects: reference/api/aspects.md
          - Queues: reference/api/queues.md
          - Secrets: reference/api/secrets.md
          - Packages: reference/api/packages.md
          - Sessions: reference/api/sessions.md
          - Live Events: reference/api/events.md
          - Search: reference/api/search.md

  - Examples:
      - examples/index.md
      - Capability Matrix: examples/capability-matrix.md


plugins:
  - search
  - llmstxt-md:
      # Serve raw markdown at .md URLs alongside HTML pages.
      # Agents get clean markdown; browsers get normal HTML — no change to UX.
      enable_markdown_urls: true

      # Generate /llms.txt — structured index for AI coding assistants
      # (Cursor, Claude Code, etc.) that actively use it during inference.
      enable_llms_txt: true

      # Generate /llms-full.txt — complete docs in a single LLM-friendly file.
      # Data shows agents visit llms-full.txt at >2× the rate of llms.txt.
      enable_llms_full: true

      markdown_description: >-
        IVCAP is a managed, provenance-aware platform for running, building,
        and orchestrating analytic services and AI agents. It exposes a REST
        API and CLI for submitting jobs, managing artifacts, querying provenance
        via the Data Fabric, and building multi-agent pipelines.

      # Section structure mirrors the site nav so agents get the same
      # information hierarchy as human readers.
      sections:
        Concepts:
          - concepts/*.md
        "Get Started":
          - getting-started/*.md
        "Guides — Running Analyses":
          - guides/running/*.md
        "Guides — Building Services":
          - guides/building/*.md
        "Guides — Building AI Agents":
          - guides/agents/*.md
        "Guides — Integrating IVCAP":
          - guides/integrating/*.md
        "Reference":
          - reference/*.md
          - reference/api/*.md
        "Examples":
          - examples/*.md


markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
