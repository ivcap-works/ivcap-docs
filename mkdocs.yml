site_name: IVCAP Documentation
site_url: https://docs.ivcap.net/
site_description: IVCAP — a managed, provenance-aware platform for running, building,
  and orchestrating analytic services and AI agents.
theme:
  name: material
  custom_dir: docs/overrides
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo/logo_white_32x32.png
  favicon: assets/favicon.ico
  palette:
  - scheme: default
    primary: indigo
    toggle:
      icon: material/toggle-switch-off-outline
      name: Switch to dark mode
  - scheme: slate
    toggle:
      icon: material/toggle-switch
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.sections
  - navigation.indexes
  - navigation.top
  - navigation.footer
  - navigation.path
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.code.annotate
exclude_docs: 'README.md

  '
validation:
  links:
    not_found: ignore
plugins:
- search
- tags
- llmstxt-md:
    enable_markdown_urls: true
    enable_llms_txt: true
    enable_llms_full: true
    markdown_description: IVCAP is a managed, provenance-aware platform for running,
      building, and orchestrating analytic services and AI agents. It exposes a REST
      API and CLI for submitting jobs, managing artifacts, querying provenance via
      the Data Fabric, and building multi-agent pipelines.
    sections:
      Concepts:
      - concepts/*.md
      Get Started:
      - getting-started/*.md
      Guides — Running Analyses:
      - guides/running/*.md
      Guides — Building Services:
      - guides/building/*.md
      Guides — Building AI Agents:
      - guides/agents/*.md
      Guides — Integrating IVCAP:
      - guides/integrating/*.md
      Reference:
      - reference/*.md
      - reference/api/*.md
      Examples:
      - examples/*.md
markdown_extensions:
- attr_list
- md_in_html
- tables
- admonition
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.tabbed:
    alternate_style: true
- toc:
    permalink: true
